<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" rx="24" fill="url(#bg)" />
  <text x="450" y="44" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="middle">Kafka KRaft Cluster Architecture</text>

  <rect x="150" y="100" width="240" height="120" rx="20" fill="#2563eb" filter="url(#glow)"/>
  <text x="270" y="150" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">controller1</text>
  <text x="270" y="178" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">port 9093</text>

  <rect x="510" y="100" width="240" height="120" rx="20" fill="#2563eb" filter="url(#glow)"/>
  <text x="630" y="150" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">controller2</text>
  <text x="630" y="178" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">port 9094</text>

  <rect x="150" y="300" width="240" height="120" rx="20" fill="#16a34a" filter="url(#glow)"/>
  <text x="270" y="350" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">broker1</text>
  <text x="270" y="378" fill="#d1fae5" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">port 9095</text>

  <rect x="510" y="300" width="240" height="120" rx="20" fill="#16a34a" filter="url(#glow)"/>
  <text x="630" y="350" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">broker2</text>
  <text x="630" y="378" fill="#d1fae5" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">port 9096</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f8fafc"/>
    </marker>
  </defs>

  <line x1="390" y1="160" x2="510" y2="160" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="510" y1="160" x2="390" y2="160" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)" />
  <text x="450" y="145" fill="#bfdbfe" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">controller quorum</text>

  <path d="M 270 220 C 270 240, 270 260, 270 300" fill="none" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 630 220 C 630 240, 630 260, 630 300" fill="none" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="270" y="270" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">broker quorum</text>
  <text x="630" y="270" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">broker quorum</text>

  <rect x="80" y="430" width="740" height="66" rx="14" fill="#0f172a" opacity="0.9"/>
  <text x="110" y="455" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Cluster Notes:</text>
  <text x="110" y="475" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="13">• Shared CLUSTER_ID across all controllers and brokers</text>
  <text x="110" y="495" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="13">• Brokers advertise localhost for producer/consumer clients</text>
</svg>
